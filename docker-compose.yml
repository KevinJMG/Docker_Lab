version: "3"

services:

  svc-daniel:
    image: casvill/cali-service:v1
    environment:
      STUDENT_NAME: Daniel
      HOOD: Los Alcazares
    networks:
      - los-alcazares
    volumes:
      - biblioteca-del-pueblo:/var/log/app
    ports:
      - "0:8080"

  svc-tina:
    image: tina237/cali-service:v1
    environment:
      STUDENT_NAME: Valentina Nitola
      BARRIO: Ciudad Jardin
    networks:
      - ciudad-jardin
    volumes:
      - biblioteca-del-pueblo:/var/log/app
    ports:
      - "0:8080"

networks:
  los-alcazares:
  ciudad-jardin:

volumes:
  biblioteca-del-pueblo: